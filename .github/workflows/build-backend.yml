name: Build & push backend image

# ACR Tasks (az acr build) はこのサブスクリプションで禁止のため、
# GitHub Actions のランナーでイメージをビルドして ACR にプッシュする。
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/mahted-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/mahted-backend:${{ github.sha }}
